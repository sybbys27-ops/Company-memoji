<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Github 메모지</title>
  <style>
    :root{
      --panel-w: 16.5cm;
      --panel-h: 20cm;

      --bg: #0b0b0f;
      --ink: #d6d6d6;
      --muted: #9aa3ad;

      --btn: #d7d7d7;
      --btn-text: #111;
      --btn-border: #7f7f7f;

      --tab: #bfbfbf;
      --tab-active: #e7e7e7;
      --tab-text: #111;

      --stroke: rgba(255,255,255,.10);
      --stroke-strong: rgba(255,255,255,.18);
      --shadow: 0 10px 30px rgba(0,0,0,.40);
      --radius: 10px;
    }

    /* ✅ 위젯 컨테이너: flex로 상단/탭/본문을 완전 분리 */
    .memo-widget{
      width: var(--panel-w);
      height: var(--panel-h);
      background: #121218;
      border: 1px solid var(--stroke-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      user-select: none;

      display: flex;            
      flex-direction: column;   
    }

    .memo-top{
      flex: 0 0 auto; 
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-bottom: 1px solid var(--stroke);
    }

    .palette{
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .swatch{
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.35);
      outline: 1px solid rgba(255,255,255,.18);
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .swatch[aria-checked="true"]{
      outline: 2px solid rgba(255,255,255,.55);
      transform: translateY(-.5px);
    }

    .actions{
      display: flex;
      gap: 8px;
    }
    .btn{
      appearance: none;
      border: 1px solid var(--btn-border);
      background: var(--btn);
      color: var(--btn-text);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: -0.2px;
      font-size: 13px;
    }
    .btn:active{ transform: translateY(1px); }

    .tabs{
      flex: 0 0 auto; 
      display: flex;
      gap: 6px;
      padding: 8px 10px 6px;
      background: rgba(255,255,255,.02);
      border-bottom: 1px solid var(--stroke);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
    }

    .tab{
      flex: 0 0 auto;
      max-width: 170px;
      padding: 6px 10px;
      border-radius: 7px 7px 0 0;
      background: var(--tab);
      color: var(--tab-text);
      font-weight: 800;
      font-size: 13px;
      border: 1px solid rgba(0,0,0,.25);
      cursor: pointer;

      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab.active{
      background: var(--tab-active);
      position: relative;
      top: 1px;
      border-bottom-color: var(--tab-active);
    }

    /* ✅ 본문: 남은 공간을 다 먹고, 스크롤은 note에만 */
    .memo-body{
      flex: 1 1 auto;   
      min-height: 0;    
      background: var(--bg);
      padding: 14px;
      overflow: hidden; 
      display: flex;
      flex-direction: column;
    }

    .note{
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      background: transparent;
      border: none;
      outline: none;

      color: var(--ink);
      font-size: 14px;
      line-height: 1.65;
      letter-spacing: -0.2px;
      user-select: text;

      overflow-y: auto;  
      overflow-x: hidden;
      white-space: pre-wrap;
    }

    .note:empty:before{
      content: attr(data-placeholder);
      color: rgba(255,255,255,.35);
    }

    .hint{
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
      flex: 0 0 auto;
    }



/* 👇 추가: 자체 설정창(Modal) 디자인 👇 */
    .modal-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center;
      z-index: 999;
    }
    .modal-box {
      background: #1e1e24; padding: 20px; border-radius: 12px;
      border: 1px solid var(--stroke-strong); width: 280px;
      display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .modal-box label { font-size: 12px; color: var(--muted); font-weight: bold; }
    .modal-box input {
      background: #121218; color: #fff; border: 1px solid #444;
      padding: 10px; border-radius: 6px; font-size: 13px; outline: none;
    }
    .modal-box input:focus { border-color: #8fd3ff; }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 5px; }
    /* 👆 여기까지 👆 */










    @media (max-width: 520px){
      .memo-widget{ width: min(92vw, var(--panel-w)); height: min(70vh, var(--panel-h)); }
    }
  </style>
</head>

<body style="margin:24px;background:#0e0e12;color:#fff;">
  <div id="memo-widget-root"></div>

  <script>
    (() => {
const STORAGE_KEY = "memo_widget_v2_gits";


      const PALETTE = [
        "#d7d7d7", "#9aa3ad",
	"#97c1a9", "#bfcfb6", "#c6dbda",
        "#cbaacb", "#abdee6",
        "#ffffb5", "#ffccb6",
        "#f3b0c3",
      ];

      function loadState(){
        try{
          const raw = localStorage.getItem(STORAGE_KEY);
          if(!raw) return null;
          return JSON.parse(raw);
        }catch(e){
          return null;
        }
      }
      function saveState(state){
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }
      function uid(){
        return Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
      }

      function defaultState(){
        const memos = [
          { id: uid(), title: "기록-1", inputColor: PALETTE[3], html: "" },
          { id: uid(), title: "기록-2", inputColor: PALETTE[3], html: "" },
          { id: uid(), title: "기록-3", inputColor: PALETTE[3], html: "" },
        ];
        return { activeId: memos[0].id, memos };
      }

      function clampActive(state){
        if(!state.memos || state.memos.length === 0){
          const one = { id: uid(), title: "기록-1", inputColor: PALETTE[3], html: "" };
          state.memos = [one];
          state.activeId = one.id;
          return;
        }
        if(!state.memos.some(m => m.id === state.activeId)){
          state.activeId = state.memos[0].id;
        }
      }

      function createWidget(mountEl){
        const state = loadState() ?? defaultState();
        clampActive(state);

        const root = document.createElement("div");
        root.className = "memo-widget";

        root.innerHTML = `
          <div class="memo-top">
            <div class="palette" role="radiogroup" aria-label="현재 입력 글자색 선택"></div>
            <div class="actions">
              <button class="btn" data-action="sync-setting" title="동기화 설정" style="background:#555; border-color:#333; color:#fff;">⚙️</button>
              <button class="btn" data-action="sync-up" style="background:#b1a995; border-color:#8a8373; color:#111;">구름저장☁️</button>
              <button class="btn" data-action="sync-down" style="background:#e7a86b; border-color:#b58454; color:#111;">불러오기☁️</button>
              <button class="btn" data-action="add">메모지추가</button>
              <button class="btn" data-action="delete">삭제</button>
            </div>
          </div>
          <div class="tabs" aria-label="기록 탭"></div>
          <div class="memo-body">
            <div class="note" contenteditable="true" aria-label="메모 입력" data-placeholder="여기에 메모를 적으세요."></div>
            <div class="hint">팁: 탭 더블클릭으로 이름 변경. (탭별 자동 저장)</div>



</div>
          <div class="modal-overlay" id="sync-modal">
            <div class="modal-box">
              <div style="font-weight:bold; color:#fff; margin-bottom:5px;">☁️ 구름 동기화 설정</div>
              <label>GitHub Token (ghp_...)</label>
              <input type="text" id="modal-token" placeholder="토큰을 입력하세요">
              <label>Gist ID (방 번호)</label>
              <input type="text" id="modal-gistid" placeholder="비워두면 새로 생성됩니다">
              <div class="modal-buttons">
                <button class="btn" id="modal-cancel" style="background:#444; border-color:#222; color:#fff;">취소</button>
                <button class="btn" id="modal-save" style="background:#8fd3ff; border-color:#6fa0d6; color:#111;">저장</button>
              </div>
            </div>


          </div>
        `;

        const paletteEl = root.querySelector(".palette");
        const tabsEl = root.querySelector(".tabs");
        const noteEl = root.querySelector(".note");


// 👇 추가: 설정창 취소/저장 버튼 동작 👇
        const syncModal = root.querySelector("#sync-modal");
        root.querySelector("#modal-cancel").addEventListener("click", () => {
          syncModal.style.display = "none";
        });
        root.querySelector("#modal-save").addEventListener("click", () => {
          state.githubToken = root.querySelector("#modal-token").value.trim();
          state.gistId = root.querySelector("#modal-gistid").value.trim();
          saveState(state);
          syncModal.style.display = "none";
          alert("⚙️ 동기화 설정이 저장되었습니다.");
        });
        // 👆 여기까지 👆




        function activeMemo(){
          return state.memos.find(m => m.id === state.activeId) ?? state.memos[0];
        }

        function setCurrentInputColor(hex){
          const memo = activeMemo();
          memo.inputColor = hex;

          noteEl.focus();

          document.execCommand("styleWithCSS", false, true);
          document.execCommand("foreColor", false, hex);

          saveState(state);
          renderPalette();
        }

        function renderPalette(){
          paletteEl.innerHTML = "";
          const memo = activeMemo();
          PALETTE.forEach((hex) => {
            const b = document.createElement("button");
            b.className = "swatch";
            b.type = "button";
            b.style.background = hex;
            b.setAttribute("role", "radio");
            b.setAttribute("aria-checked", String(memo.inputColor === hex));
            b.title = hex;
            b.addEventListener("click", () => setCurrentInputColor(hex));
            paletteEl.appendChild(b);
          });
        }

        function renderTabs(){
          tabsEl.innerHTML = "";
          state.memos.forEach(m => {
            const t = document.createElement("button");
            t.className = "tab" + (m.id === state.activeId ? " active" : "");
            t.type = "button";
            t.textContent = m.title || "기록";
            t.title = m.title || "기록";
            t.addEventListener("click", () => {
              const cur = activeMemo();
              cur.html = noteEl.innerHTML;
              state.activeId = m.id;
              saveState(state);
              render();
            });
            t.addEventListener("dblclick", () => {
              const next = prompt("기록 이름을 입력하세요:", m.title ?? "");
              if(next === null) return;
              const trimmed = next.trim();
              if(trimmed.length) m.title = trimmed;
              saveState(state);
              renderTabs();
            });
            tabsEl.appendChild(t);
          });
        }

        function renderNote(){
          const memo = activeMemo();
          noteEl.innerHTML = memo.html ?? "";
          noteEl.style.color = "#d6d6d6";

          setTimeout(() => {
            noteEl.focus();
            document.execCommand("styleWithCSS", false, true);
            document.execCommand("foreColor", false, memo.inputColor ?? PALETTE[3]);
          }, 0);

          noteEl.scrollTop = 0;
        }

        function render(){
          clampActive(state);
          renderTabs();
          renderPalette();
          renderNote();
        }

        noteEl.addEventListener("input", () => {
          const memo = activeMemo();
          memo.html = noteEl.innerHTML;
          saveState(state);
        });

        noteEl.addEventListener("keydown", () => {
          const memo = activeMemo();
          document.execCommand("styleWithCSS", false, true);
          document.execCommand("foreColor", false, memo.inputColor ?? PALETTE[3]);
        });

        root.addEventListener("click", (e) => {
          const btn = e.target.closest("[data-action]");
          if(!btn) return;

          const act = btn.getAttribute("data-action");

          // 👇 Gist 동기화 로직 추가 👇


if(act === "sync-setting"){
            root.querySelector("#modal-token").value = state.githubToken || "";
            root.querySelector("#modal-gistid").value = state.gistId || "";
            syncModal.style.display = "flex";
            return;
          }



          if(act === "sync-up"){
            if(!state.githubToken){
              alert("먼저 ⚙️ 버튼을 눌러 GitHub 토큰을 설정해 주세요.");
              return;
            }
            activeMemo().html = noteEl.innerHTML; 
            saveState(state);

// 👇 추가 및 수정할 부분 👇
            const safeState = Object.assign({}, state);
            delete safeState.githubToken; // 짐보따리에서 열쇠(토큰)만 쏙 빼기!



            const content = JSON.stringify(safeState, null, 2);


            const originalText = btn.textContent;
            btn.textContent = "저장중...";

            if(!state.gistId) {
              fetch("https://api.github.com/gists", {
                method: "POST",
                headers: { "Accept": "application/vnd.github+json", "Authorization": `Bearer ${state.githubToken}` },
                body: JSON.stringify({
                  "description": "Memoji Sync Data",
                  "public": false,
                  "files": { "memoji_data.json": { "content": content } }
                })
              }).then(res => res.json()).then(data => {
                state.gistId = data.id;
                saveState(state);
                btn.textContent = originalText;
                alert(`새로운 구름 저장소가 만들어졌습니다! ☁️\n\n발급된 Gist ID:\n${data.id}\n\n다른 PC에서 불러올 때 이 ID를 설정(⚙️)에 꼭 입력하세요!`);
              }).catch(err => { btn.textContent = originalText; alert("업로드 실패: " + err); });
            } else {
              fetch(`https://api.github.com/gists/${state.gistId}`, {
                method: "PATCH",
                headers: { "Accept": "application/vnd.github+json", "Authorization": `Bearer ${state.githubToken}` },
                body: JSON.stringify({ "files": { "memoji_data.json": { "content": content } } })
              }).then(res => {
                btn.textContent = originalText;
                if(res.ok) alert("구름에 성공적으로 업데이트 되었습니다! ☁️");
                else alert("업로드 실패. 토큰이나 ID를 다시 확인하세요.");
              }).catch(err => { btn.textContent = originalText; alert("업로드 오류: " + err); });
            }
          }

          if(act === "sync-down"){
            if(!state.githubToken || !state.gistId){
              alert("먼저 ⚙️ 버튼을 눌러 GitHub 토큰과 Gist ID를 모두 설정해 주세요.");
              return;
            }
            const originalText = btn.textContent;
            btn.textContent = "불러오는중...";

            fetch(`https://api.github.com/gists/${state.gistId}`, {
              headers: { "Accept": "application/vnd.github+json", "Authorization": `Bearer ${state.githubToken}` }
            }).then(res => res.json()).then(data => {
              btn.textContent = originalText;
              const file = data.files && data.files["memoji_data.json"];
              if(file) {
                const importedState = JSON.parse(file.content);
                const currentToken = state.githubToken;
                const currentGistId = state.gistId;
                
                Object.assign(state, importedState);
                state.githubToken = currentToken;
                state.gistId = currentGistId;
                
                saveState(state);
                render();
                alert("구름에서 메모를 성공적으로 불러왔습니다! ☁️");
              } else {
                alert("저장된 메모 데이터를 찾을 수 없습니다.");
              }
            }).catch(err => { btn.textContent = originalText; alert("다운로드 오류: " + err); });
          }
          // 👆 여기까지 👆

          if(act === "add"){
            const name = prompt("새 기록 이름을 입력하세요:", `기록-${state.memos.length + 1}`);
            if(name === null) return;

            activeMemo().html = noteEl.innerHTML;

            const memo = {
              id: uid(),
              title: name.trim() || `기록-${state.memos.length + 1}`,
              inputColor: activeMemo().inputColor ?? PALETTE[3],
              html: ""
            };
            state.memos.push(memo);
            state.activeId = memo.id;
            saveState(state);
            render();
          }

          if(act === "delete"){
            if(state.memos.length <= 1){
              alert("최소 1개의 기록은 남겨야 해요.");
              return;
            }
            const memo = activeMemo();
            const ok = confirm(`"${memo.title}"을(를) 삭제할까요?`);
            if(!ok) return;

            const idx = state.memos.findIndex(m => m.id === memo.id);
            state.memos.splice(idx, 1);

            const next = state.memos[idx - 1] ?? state.memos[idx] ?? state.memos[0];
            state.activeId = next.id;

            saveState(state);
            render();
          }
        });

        render();
        mountEl.appendChild(root);
      }

      createWidget(document.getElementById("memo-widget-root"));
    })();
  </script>
</body>
</html>
